services:
  # ── PostgreSQL ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: compras_db
    environment:
      POSTGRES_USER: compras_user
      POSTGRES_PASSWORD: compras_password
      POSTGRES_DB: compras_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U compras_user -d compras_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── MinIO (Object Storage) ────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: compras_minio
    environment:
      MINIO_ROOT_USER: compras_minio_admin
      MINIO_ROOT_PASSWORD: compras_minio_password
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  # ── MinIO Init (Creates Buckets) ──────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: compras_minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      /usr/bin/mc alias set myminio http://minio:9000 compras_minio_admin compras_minio_password;
      /usr/bin/mc mb myminio/compras || true;
      /usr/bin/mc anonymous set download myminio/compras || true;
      exit 0;
      "

  # ── NestJS Backend ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: compras_backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://compras_user:compras_password@db:5432/compras_db
      JWT_SECRET: compras_super_secret_key_2026
      PORT: 3000
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── React Frontend (Nginx) ──────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3000/api/v1
    container_name: compras_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
